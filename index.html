<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест по переводу слов</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Верхняя панель -->
        <header class="header">
            <h1>Тест по переводу слов</h1>
            <div class="flags">
                <span class="flag">🇷🇺</span>
                <span class="arrow">→</span>
                <span class="flag">🇬🇧</span>
            </div>
        </header>

        <!-- Панель управления направлением -->
        <div class="controls">
            <label>
                <input type="radio" name="direction" value="ru_to_en" checked> Русский → Английский
            </label>
            <label>
                <input type="radio" name="direction" value="en_to_ru"> Английский → Русский
            </label>
        </div>

        <!-- Основной блок с вопросом -->
        <main class="main-content">
            <div id="word-display" class="word-display">
                <p>Нажмите "Начать", чтобы начать тест.</p>
            </div>

            <div class="input-area">
                <input type="text" id="answer-input" placeholder="Введите перевод..." disabled>
                <button id="check-btn" disabled>Проверить</button>
                <button id="start-btn">Начать</button>
            </div>
        </main>

        <!-- Индикатор прогресса -->
        <div class="progress-section">
            <p>Ваш прогресс:</p>
            <div class="progress-bar-outer">
                <div id="progress-bar-fill" class="progress-bar-inner"></div>
            </div>
            <p id="stats-info">Верных ответов: 0 | Ошибок: 0 | Осталось: 0</p>
        </div>

        <!-- Блок для результатов и ошибок -->
        <footer class="footer">
            <p id="result-message"></p>
            <p id="mistakes-list"></p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
